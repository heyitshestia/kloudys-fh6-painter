description = Flat colors / logos: crisp decal preset for hard borders, mascot art, text-like shapes, and broad color panels. Uses edge-biased shapes, a focused 1400 max resolution, and Luma Prep because this keeps outlines and flat color islands cleaner than soft gradient settings.
maxPreviewSize = 500
maxResolution = 1400
maxThreads = 0
mutatedSamples = 22000
maxNoImproveRetries = 10000
forceOpaqueShapes = true
posterizeLevels = 64
previewEvery = 50
randomSamples = 520000
saveAt = 500,1000,1500,2000
saveEvery = 250
shapeMode = mixed_edge_bias
stopAt = 2000
useWorkGroupEval = true
v2PreprocessMode = luma_bands
v2EnableRepair = true
