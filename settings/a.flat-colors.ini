description = Flat colors: V6 opaque preset for stickers, cel shading, mascots, and broad clean color panels. Uses a 1000px cap, Luma Prep, late boundary awareness, and adaptive workload so clean-color jobs stay faster after the broad shapes are placed.
maxPreviewSize = 500
maxResolution = 1000
maxThreads = 0
mutatedSamples = 12000
maxNoImproveRetries = 10000
forceOpaqueShapes = true
posterizeLevels = 64
previewEvery = 50
randomSamples = 240000
saveAt = 500,1000,1500,2000
saveEvery = 250
shapeMode = mixed_edge_bias
stopAt = 2000
useWorkGroupEval = true
enableProgressiveSampling = false
errorGridSize = 64
enableDetailWeightedSampling = false
detailSamplingStrength = 0.0
detailSamplingStart = 0.65
enableBoundaryAwareRadius = true
boundaryRadiusPadding = 18.0
boundaryRadiusStart = 0.42
enableAdaptiveWorkload = true
adaptiveWorkloadStart = 0.62
adaptiveRandomMinScale = 0.65
adaptiveMutatedMinScale = 0.75
v2PreprocessMode = luma_bands
v2EnableRepair = true
