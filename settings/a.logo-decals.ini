description = Logo decals: high-fidelity preset for brand marks, text-like art, emblems, and decals where color matching, sharp edges, and smooth curves matter more than soft shading. Uses edge-biased opaque shapes, higher source resolution, heavier search, and no Luma Prep by default so colors stay closer to the source.
maxPreviewSize = 500
maxResolution = 2000
maxThreads = 0
mutatedSamples = 42000
maxNoImproveRetries = 10000
forceOpaqueShapes = true
logoHardEdges = true
posterizeLevels = 192
previewEvery = 50
randomSamples = 780000
saveAt = 500,1000,1500,2000
saveEvery = 250
shapeMode = mixed_edge_bias
stopAt = 2000
useWorkGroupEval = true
v2PreprocessMode = none
v2EnableRepair = true
