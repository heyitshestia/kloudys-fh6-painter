description = Shaded character art: V7 anime/digital-art default. Uses a 1100px cap, stronger late detail sampling, low rectangle share, and no legacy repair so eyes, hair, hands, and linework stay sharper.
maxPreviewSize = 500
maxResolution = 1100
maxThreads = 0
mutatedSamples = 15000
maxNoImproveRetries = 10000
forceOpaqueShapes = true
posterizeLevels = 112
previewEvery = 50
randomSamples = 340000
saveAt = 500,1000,1250,1500
saveEvery = 250
shapeMode = mixed_smart_detail
stopAt = 1500
useWorkGroupEval = true
enableProgressiveSampling = false
errorGridSize = 64
enableDetailWeightedSampling = true
detailSamplingStrength = 0.56
detailSamplingFloor = 0.22
detailSamplingStart = 0.54
enableBoundaryAwareRadius = true
boundaryRadiusPadding = 10.0
boundaryRadiusStart = 0.34
enableAdaptiveWorkload = true
adaptiveWorkloadStart = 0.70
adaptiveRandomMinScale = 0.72
adaptiveMutatedMinScale = 0.84
enableLateSmallCandidates = true
lateSmallCandidateShare = 0.52
lateSmallCandidateStart = 0.52
lateSmallCandidateRadiusFrac = 0.030
minUsefulDelta = 0.22
rectangleCandidateShare = 0.10
rectangleCandidateStart = 0.22
v2PreprocessMode = none
v2EnableRepair = false
