description = Shaded character art: V6 anime/digital-art default. Keeps opaque shapes, uses a fast 1000px working cap, mild late detail weighting, and adaptive workload so late cleanup is faster without changing the early structure pass.
maxPreviewSize = 500
maxResolution = 1000
maxThreads = 0
mutatedSamples = 10000
maxNoImproveRetries = 10000
forceOpaqueShapes = true
posterizeLevels = 96
previewEvery = 50
randomSamples = 240000
saveAt = 500,1000,1500,2000
saveEvery = 250
shapeMode = mixed_smart_detail
stopAt = 2000
useWorkGroupEval = true
enableProgressiveSampling = false
errorGridSize = 64
enableDetailWeightedSampling = true
detailSamplingStrength = 0.35
detailSamplingStart = 0.65
enableBoundaryAwareRadius = false
boundaryRadiusPadding = 18.0
boundaryRadiusStart = 0.42
enableAdaptiveWorkload = true
adaptiveWorkloadStart = 0.62
adaptiveRandomMinScale = 0.65
adaptiveMutatedMinScale = 0.75
v2PreprocessMode = none
v2EnableRepair = true
